name: Backend CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write          # needed to push the image to GHCR

env:
  IMAGE: ghcr.io/${{ github.repository }}   # ghcr.io/<owner>/sketchbook-backend

jobs:
  # ── Job 1: test (runs on every push AND every pull request) ──
  test:
    name: Test & coverage
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven                      # cache Maven dependencies

      - name: Run unit + integration tests
        run: mvn -B verify                  # runs tests + JaCoCo report

      - name: Upload coverage report
        if: always()                        # upload even if tests fail
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco

  # ── Job 2: build & push image (only on a real merge to main) ──
  build-and-push:
    name: Build & push image to GHCR
    runs-on: ubuntu-latest
    needs: test                             # only runs if tests passed
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # commit-SHA tag = unique/traceable; latest = moving "newest" pointer
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest

  # ── Job 3: deploy (only on a real merge to main) ──
  # Skips cleanly until the Render secrets are configured, so the
  # pipeline stays green before the hosting target is wired up.
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: build-and-push                   # only deploy a pushed image
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Trigger Render deploy and verify health
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
          RENDER_APP_URL: ${{ secrets.RENDER_APP_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "RENDER_DEPLOY_HOOK_URL not set — Render not configured yet, skipping deploy."
            exit 0
          fi
          echo "Triggering Render deploy..."
          curl -fsS -X POST "$RENDER_DEPLOY_HOOK_URL"
          echo "Waiting for service to become healthy..."
          for i in $(seq 1 30); do
            if curl -fsS "$RENDER_APP_URL/actuator/health" | grep -q '"status":"UP"'; then
              echo "Service is UP"; exit 0
            fi
            echo "Waiting for service... ($i/30)"
            sleep 10
          done
          echo "Service did not become healthy in time"; exit 1
